; supervisord config — runs all four services inside the single container.
; Each [program] block is one service. Logs go to the container's stdout/stderr
; (so `docker logs` / Azure Log stream shows everything in one place).

[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[unix_http_server]
file=/tmp/supervisor.sock

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

; --- OCR policy service (:8010) ---
[program:ocr]
command=python main.py
directory=/app/ocr-service
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; --- LangGraph chat agent (:8000) ---
[program:agent]
command=python main.py
directory=/app/agent
autostart=true
autorestart=true
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; --- Airtable + financial planning API (:8001) ---
; Started from /app so `backend/...` paths and Financial_Planning imports resolve
; the same way they do via scripts/start-dev.ps1.
[program:backend]
command=python backend/airtable_main.py
directory=/app
autostart=true
autorestart=true
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; --- Next.js frontend (:3000) — the only publicly exposed service ---
; Starts last; the frontend only proxies to the others on demand, so it tolerates
; the Python services taking a moment to come up.
[program:web]
command=npm start
directory=/app
autostart=true
autorestart=true
priority=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
