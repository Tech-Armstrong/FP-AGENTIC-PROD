name: Trigger auto deployment for fpagentic

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/fpagentic-AutoDeployTrigger-3c3483aa-56ec-434a-9f81-d78d0e505b13.yml'

  # Allow manual trigger 
  workflow_dispatch:
      
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.FPAGENTIC_AZURE_CREDENTIALS }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: fpagentic.azurecr.io
          registryUsername: ${{ secrets.FPAGENTIC_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.FPAGENTIC_REGISTRY_PASSWORD }}
          containerAppName: fpagentic
          resourceGroup: Financial_Planning_Automation
          imageToBuild: fpagentic.azurecr.io/fpagentic:${{ github.sha }}
          
            

     

